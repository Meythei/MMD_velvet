name: Build Zip Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-zips:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows Zip
            os: windows-latest
            forge_platform: win32
            artifact_name: mmd-modoki-windows-x64-zip
          - label: macOS Zip
            os: macos-latest
            forge_platform: darwin
            artifact_name: mmd-modoki-macos-x64-zip
          - label: Linux Zip
            os: ubuntu-latest
            forge_platform: linux
            artifact_name: mmd-modoki-linux-x64-zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build zip package
        run: npm run make:zip -- --platform=${{ matrix.forge_platform }} --arch=x64

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/make/**/*.zip
          if-no-files-found: error
